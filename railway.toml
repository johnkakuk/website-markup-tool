[build]
builder = "NIXPACKS"
buildCommand = "npm run build --workspace @website-markup-tool/proxy"
watchPatterns = ["apps/proxy/**", "package.json", "package-lock.json"]

[deploy]
startCommand = "npm run start --workspace @website-markup-tool/proxy"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
